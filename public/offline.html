<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feeti — Hors ligne</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #811AEC;
      --pink:   #E43962;
      --yellow: #F1C519;
      --teal:   #16BDA0;
    }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #080812;
      color: #fff;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      padding: 2rem 1.5rem;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    /* ─── Glowing orbs in background ─── */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(129,26,236,.35) 0%, transparent 70%);
      top: -100px; left: -100px;
      animation: drift1 8s ease-in-out infinite alternate;
    }
    body::after {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(228,57,98,.25) 0%, transparent 70%);
      bottom: -80px; right: -80px;
      animation: drift2 10s ease-in-out infinite alternate;
    }
    @keyframes drift1 { to { transform: translate(60px, 40px); } }
    @keyframes drift2 { to { transform: translate(-50px, -30px); } }

    /* ─── Content wrapper ─── */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 28px;
      padding: 2.5rem 2rem;
      max-width: 400px;
      width: 100%;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(129,26,236,.15),
        0 32px 64px rgba(0,0,0,.5);
    }

    /* ─── Icon ─── */
    .icon-wrap {
      position: relative;
      width: 88px;
      height: 88px;
      margin: 0 auto 1.75rem;
    }
    .icon-bg {
      position: absolute;
      inset: 0;
      border-radius: 24px;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      opacity: .15;
      animation: pulse 2.5s ease-in-out infinite;
    }
    .icon-inner {
      position: absolute;
      inset: 8px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1);   opacity: .15; }
      50%       { transform: scale(1.2); opacity: .3; }
    }

    /* ─── Wifi off icon ─── */
    .wifi-badge {
      position: absolute;
      bottom: -6px;
      right: -6px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #1a1a2e;
      border: 2px solid rgba(255,255,255,.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .9rem;
    }

    /* ─── Title ─── */
    h1 {
      font-size: 1.65rem;
      font-weight: 800;
      letter-spacing: -.02em;
      line-height: 1.2;
      color: #fff;
      margin-bottom: .6rem;
    }
    h1 span {
      background: linear-gradient(90deg, var(--purple), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ─── Description ─── */
    .desc {
      font-size: .95rem;
      line-height: 1.65;
      color: rgba(255,255,255,.55);
      margin-bottom: 2rem;
    }

    /* ─── Chips ─── */
    .chips {
      display: flex;
      gap: .6rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 99px;
      padding: .35rem .85rem;
      font-size: .78rem;
      color: rgba(255,255,255,.7);
      white-space: nowrap;
    }
    .chip-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ─── Retry button ─── */
    .btn-retry {
      width: 100%;
      padding: .9rem 1.5rem;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .01em;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, opacity .15s;
      box-shadow: 0 8px 24px rgba(129,26,236,.4);
    }
    .btn-retry:hover  { transform: translateY(-1px); box-shadow: 0 12px 32px rgba(129,26,236,.55); }
    .btn-retry:active { transform: translateY(0);    opacity: .9; }
    .btn-retry.loading { opacity: .7; pointer-events: none; }

    /* ─── Status bar ─── */
    .status-bar {
      margin-top: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      min-height: 20px;
      font-size: .8rem;
      color: rgba(255,255,255,.4);
      transition: color .3s;
    }
    .status-bar.online  { color: var(--teal); }
    .status-bar.error   { color: var(--pink); }
    .status-bar.checking { color: var(--yellow); }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }
    .status-dot.spin {
      animation: blink .7s ease-in-out infinite alternate;
    }
    @keyframes blink { to { opacity: .2; } }

    /* ─── Footer ─── */
    .footer {
      position: relative;
      z-index: 1;
      margin-top: 2rem;
      font-size: .75rem;
      color: rgba(255,255,255,.2);
    }
    .footer strong { color: rgba(255,255,255,.4); }
  </style>
</head>
<body>

  <div class="card">

    <!-- Icon -->
    <div class="icon-wrap">
      <div class="icon-bg"></div>
      <div class="icon-inner">🎟️</div>
      <div class="wifi-badge">📵</div>
    </div>

    <!-- Title -->
    <h1>Vous êtes<br /><span>hors ligne</span></h1>

    <!-- Description -->
    <p class="desc">
      Vérifiez votre connexion Internet et réessayez.<br />
      Vos billets et événements récents restent disponibles.
    </p>

    <!-- Info chips -->
    <div class="chips">
      <span class="chip">
        <span class="chip-dot" style="background:#16BDA0"></span>
        Billets en cache
      </span>
      <span class="chip">
        <span class="chip-dot" style="background:#F1C519"></span>
        Événements récents
      </span>
      <span class="chip">
        <span class="chip-dot" style="background:#811AEC"></span>
        Mode hors-ligne
      </span>
    </div>

    <!-- Retry -->
    <button class="btn-retry" id="retryBtn" onclick="retry()">
      Réessayer la connexion
    </button>

    <!-- Status -->
    <div class="status-bar" id="statusBar">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText"></span>
    </div>

  </div>

  <p class="footer">
    <strong>Feeti</strong> — Billetterie &amp; Streaming
  </p>

  <script>
    const btn       = document.getElementById('retryBtn');
    const bar       = document.getElementById('statusBar');
    const dot       = document.getElementById('statusDot');
    const txt       = document.getElementById('statusText');

    function setStatus(state, message) {
      bar.className = 'status-bar ' + state;
      dot.className = 'status-dot' + (state === 'checking' ? ' spin' : '');
      txt.textContent = message;
    }

    function retry() {
      btn.classList.add('loading');
      btn.textContent = 'Vérification…';
      setStatus('checking', 'Test de connexion en cours…');

      fetch('/', { method: 'HEAD', cache: 'no-store' })
        .then(() => {
          setStatus('online', 'Connexion rétablie !');
          setTimeout(() => { window.location.href = '/'; }, 600);
        })
        .catch(() => {
          setStatus('error', 'Toujours hors ligne. Réessayez dans un moment.');
          btn.classList.remove('loading');
          btn.textContent = 'Réessayer la connexion';
        });
    }

    // Auto-redirect lorsque la connexion revient
    window.addEventListener('online', () => {
      setStatus('online', 'Connexion rétablie, redirection…');
      setTimeout(() => { window.location.href = '/'; }, 800);
    });

    window.addEventListener('offline', () => {
      setStatus('error', 'Connexion perdue.');
    });
  </script>
</body>
</html>
